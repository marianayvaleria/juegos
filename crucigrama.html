<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Crucigrama Bootstrap</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>

    body{
      background:linear-gradient(135deg,#ffd6e0,#ffc2d1);
      min-height:100vh;
    }

    .title{
      color:#d63384;
      font-weight:bold;
    }

    .crossword{
      display:grid;
      grid-template-columns:repeat(15,42px);
      gap:4px;
      justify-content:center;
    }

    .cell{
      width:42px;
      height:42px;
      position:relative;
    }

    .black{
      background:#212529;
      border-radius:8px;
    }

    .cross-input{
      width:100%;
      height:100%;
      text-align:center;
      text-transform:uppercase;
      font-size:20px;
      font-weight:bold;
      border:2px solid #f8bbd0;
      border-radius:8px;
      outline:none;
    }

    .cross-input:focus{
      border-color:#d63384;
      background:#fff0f5;
    }

    .correct{
      background:#c8e6c9 !important;
      color:#198754;
      border-color:#198754;
    }

    .number{
      position:absolute;
      top:1px;
      left:4px;
      font-size:10px;
      font-weight:bold;
      color:#d63384;
    }

    .completed{
      text-decoration:line-through;
      color:#198754 !important;
      font-weight:bold;
    }

    .timer{
      font-size:22px;
      font-weight:bold;
      color:#c2185b;
    }

    .answer-badge{
      background:#d63384;
    }

    @media(max-width:768px){

      .crossword{
        grid-template-columns:repeat(15,28px);
      }

      .cell{
        width:28px;
        height:28px;
      }

      .cross-input{
        font-size:14px;
      }

    }

  </style>
</head>
<body>

<div class="container py-4">

  <div class="card shadow-lg border-0 rounded-4">

    <div class="card-body p-4">

      <h1 class="text-center title mb-4">
        💄 Crucigrama de Maquillaje
      </h1>

      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">

        <div class="timer">
          ⏱ Tiempo:
          <span id="time">00:00</span>
        </div>

        <button
          class="btn btn-danger px-4"
          onclick="restartGame()"
        >
          🔄 Reiniciar
        </button>

      </div>

      <div class="row g-4">

        <!-- CRUCIGRAMA -->
        <div class="col-lg-8 text-center">

          <div
            class="crossword mx-auto"
            id="crossword"
          ></div>

        </div>

        <!-- PANEL -->
        <div class="col-lg-4">

          <!-- PISTAS -->
          <div class="card shadow-sm border-0 rounded-4 mb-4">

            <div class="card-body">

              <h4 class="text-danger mb-3">
                Horizontal
              </h4>

              <ul
                class="list-group mb-4"
                id="horizontal-clues"
              ></ul>

              <h4 class="text-danger mb-3">
                Vertical
              </h4>

              <ul
                class="list-group"
                id="vertical-clues"
              ></ul>

            </div>

          </div>

          <!-- RESPUESTAS -->
          <div class="card shadow-sm border-0 rounded-4">

            <div class="card-body">

              <h4 class="text-primary mb-3">
                ✅ Respuestas
              </h4>

              <div
                id="answers"
                class="d-flex flex-wrap gap-2"
              ></div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

  // ==========================
  // CONFIG
  // ==========================

  const size = 15;

  const crossword =
    document.getElementById("crossword");

  // ==========================
  // PALABRAS
  // ==========================

  const words = [

    {
      word:"MAC",
      clue:"Marca profesional famosa",
      row:1,
      col:1,
      direction:"horizontal",
      number:1
    },

    {
      word:"LOREAL",
      clue:"Marca francesa",
      row:3,
      col:0,
      direction:"horizontal",
      number:2
    },

    {
      word:"DIOR",
      clue:"Marca de lujo",
      row:5,
      col:4,
      direction:"horizontal",
      number:3
    },

    {
      word:"NYX",
      clue:"Marca juvenil",
      row:7,
      col:2,
      direction:"horizontal",
      number:4
    },

    {
      word:"NARS",
      clue:"Rubores famosos",
      row:9,
      col:5,
      direction:"horizontal",
      number:5
    },

    {
      word:"AVON",
      clue:"Venta por catálogo",
      row:0,
      col:8,
      direction:"vertical",
      number:6
    },

    {
      word:"SEPHORA",
      clue:"Cadena cosmética",
      row:2,
      col:11,
      direction:"vertical",
      number:7
    },

    {
      word:"REVLON",
      clue:"Marca clásica",
      row:4,
      col:13,
      direction:"vertical",
      number:8
    }

  ];

  // ==========================
  // GRID
  // ==========================

  let grid = [];

  function createGrid(){

    grid = [];

    for(let r=0;r<size;r++){

      let row=[];

      for(let c=0;c<size;c++){

        row.push("");

      }

      grid.push(row);

    }

  }

  // ==========================
  // INSERTAR PALABRAS
  // ==========================

  function placeWords(){

    words.forEach(item=>{

      let {word,row,col,direction} = item;

      for(let i=0;i<word.length;i++){

        if(direction==="horizontal"){

          grid[row][col+i] = word[i];

        }else{

          grid[row+i][col] = word[i];

        }

      }

    });

  }

  // ==========================
  // DIBUJAR
  // ==========================

  function drawCrossword(){

    crossword.innerHTML = "";

    for(let r=0;r<size;r++){

      for(let c=0;c<size;c++){

        const cell =
          document.createElement("div");

        cell.classList.add("cell");

        if(grid[r][c] === ""){

          cell.classList.add("black");

        }

        else{

          const input =
            document.createElement("input");

          input.maxLength = 1;

          input.classList.add("cross-input");

          input.dataset.row = r;

          input.dataset.col = c;

          input.dataset.letter = grid[r][c];

          input.addEventListener(
            "input",
            validateInput
          );

          cell.appendChild(input);

          // NUMEROS
          words.forEach(w=>{

            if(w.row===r && w.col===c){

              const number =
                document.createElement("div");

              number.classList.add("number");

              number.textContent = w.number;

              cell.appendChild(number);

            }

          });

        }

        crossword.appendChild(cell);

      }

    }

  }

  // ==========================
  // PISTAS
  // ==========================

  function drawClues(){

    const horizontal =
      document.getElementById("horizontal-clues");

    const vertical =
      document.getElementById("vertical-clues");

    horizontal.innerHTML = "";

    vertical.innerHTML = "";

    words.forEach(item=>{

      const li =
        document.createElement("li");

      li.className =
        "list-group-item";

      li.id = item.word;

      li.innerHTML =
        `<strong>${item.number}.</strong> ${item.clue}`;

      if(item.direction==="horizontal"){

        horizontal.appendChild(li);

      }else{

        vertical.appendChild(li);

      }

    });

  }

  // ==========================
  // RESPUESTAS
  // ==========================

  function drawAnswers(){

    const answers =
      document.getElementById("answers");

    answers.innerHTML = "";

    words.forEach(item=>{

      const badge =
        document.createElement("span");

      badge.className =
        "badge rounded-pill answer-badge p-2";

      badge.textContent = item.word;

      answers.appendChild(badge);

    });

  }

  // ==========================
  // VALIDAR
  // ==========================

  function validateInput(e){

    const input = e.target;

    const correct =
      input.dataset.letter;

    input.value =
      input.value.toUpperCase();

    // INCORRECTO
    if(input.value !== correct){

      input.value = "";

      return;

    }

    input.classList.add("correct");

    checkWords();

  }

  // ==========================
  // VERIFICAR PALABRAS
  // ==========================

  function checkWords(){

    let completed = 0;

    words.forEach(item=>{

      let correct = true;

      for(let i=0;i<item.word.length;i++){

        let r = item.row;

        let c = item.col;

        if(item.direction==="horizontal"){

          c += i;

        }else{

          r += i;

        }

        const input =
          document.querySelector(
            `input[data-row="${r}"][data-col="${c}"]`
          );

        if(!input || input.value !== item.word[i]){

          correct = false;

        }

      }

      const clue =
        document.getElementById(item.word);

      if(correct){

        clue.classList.add("completed");

        completed++;

      }

    });

    // GANADOR
    if(completed === words.length){

      clearInterval(timer);

      Swal.fire({

        title:"🎉 ¡FELICIDADES!",

        text:"Has completado el crucigrama",

        icon:"success",

        confirmButtonColor:"#d63384"

      });

    }

  }

  // ==========================
  // TIMER
  // ==========================

  let seconds = 0;

  let timer;

  function startTimer(){

    clearInterval(timer);

    seconds = 0;

    timer = setInterval(()=>{

      seconds++;

      let mins =
        Math.floor(seconds / 60);

      let secs =
        seconds % 60;

      document.getElementById("time")
      .textContent =
      `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;

    },1000);

  }

  // ==========================
  // REINICIAR
  // ==========================

  function restartGame(){

    createGrid();

    placeWords();

    drawCrossword();

    drawClues();

    drawAnswers();

    startTimer();

  }

  // ==========================
  // INICIAR
  // ==========================

  restartGame();

</script>

</body>
</html>
