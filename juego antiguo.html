<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retro Game Bootstrap</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #111;
      color: #0f0;
      font-family: "Courier New", monospace;
      overflow: hidden;
    }

    .game-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    canvas {
      background: black;
      border: 4px solid #0f0;
      box-shadow: 0 0 20px #0f0;
    }

    .retro-title {
      font-size: 3rem;
      text-shadow: 0 0 10px #0f0;
      margin-bottom: 20px;
    }

    .score-board {
      font-size: 1.5rem;
      margin-top: 15px;
    }

    .btn-retro {
      background: black;
      color: #0f0;
      border: 2px solid #0f0;
    }

    .btn-retro:hover {
      background: #0f0;
      color: black;
    }
  </style>
</head>
<body>

<div class="container-fluid game-container">

  <h1 class="retro-title">RETRO SNAKE</h1>

  <canvas id="game" width="400" height="400"></canvas>

  <div class="score-board">
    Puntos: <span id="score">0</span>
  </div>

  <button class="btn btn-retro mt-3" onclick="restartGame()">
    Reiniciar Juego
  </button>

</div>

<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const box = 20;
  let snake = [{ x: 200, y: 200 }];
  let direction = "RIGHT";

  let food = {
    x: Math.floor(Math.random() * 20) * box,
    y: Math.floor(Math.random() * 20) * box
  };

  let score = 0;
  let game;

  document.addEventListener("keydown", changeDirection);

  function changeDirection(event) {
    if (event.key === "ArrowLeft" && direction !== "RIGHT")
      direction = "LEFT";

    if (event.key === "ArrowUp" && direction !== "DOWN")
      direction = "UP";

    if (event.key === "ArrowRight" && direction !== "LEFT")
      direction = "RIGHT";

    if (event.key === "ArrowDown" && direction !== "UP")
      direction = "DOWN";
  }

  function drawGame() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, 400, 400);

    // Snake
    for (let i = 0; i < snake.length; i++) {
      ctx.fillStyle = i === 0 ? "#00FF00" : "#009900";
      ctx.fillRect(snake[i].x, snake[i].y, box, box);

      ctx.strokeStyle = "#111";
      ctx.strokeRect(snake[i].x, snake[i].y, box, box);
    }

    // Food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, box, box);

    let headX = snake[0].x;
    let headY = snake[0].y;

    if (direction === "LEFT") headX -= box;
    if (direction === "UP") headY -= box;
    if (direction === "RIGHT") headX += box;
    if (direction === "DOWN") headY += box;

    // Comer comida
    if (headX === food.x && headY === food.y) {
      score++;
      document.getElementById("score").innerText = score;

      food = {
        x: Math.floor(Math.random() * 20) * box,
        y: Math.floor(Math.random() * 20) * box
      };
    } else {
      snake.pop();
    }

    const newHead = {
      x: headX,
      y: headY
    };

    // Colisiones
    if (
      headX < 0 ||
      headY < 0 ||
      headX >= 400 ||
      headY >= 400 ||
      collision(newHead, snake)
    ) {
      clearInterval(game);

      ctx.fillStyle = "#0f0";
      ctx.font = "30px Courier New";
      ctx.fillText("GAME OVER", 95, 200);
    }

    snake.unshift(newHead);
  }

  function collision(head, array) {
    for (let i = 0; i < array.length; i++) {
      if (head.x === array[i].x && head.y === array[i].y) {
        return true;
      }
    }
    return false;
  }

  function restartGame() {
    snake = [{ x: 200, y: 200 }];
    direction = "RIGHT";
    score = 0;

    document.getElementById("score").innerText = score;

    food = {
      x: Math.floor(Math.random() * 20) * box,
      y: Math.floor(Math.random() * 20) * box
    };

    clearInterval(game);
    game = setInterval(drawGame, 120);
  }

  game = setInterval(drawGame, 120);
</script>

</body>
</html>
