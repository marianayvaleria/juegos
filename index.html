<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Proyecto de Juegos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body{
        background: linear-gradient(135deg,#0d6efd,#6610f2);
        min-height:100vh;
        font-family:Arial, sans-serif;
        padding:40px 20px;
    }

    .contenedor{
        max-width:900px;
        margin:auto;
    }

    .card-principal{
        background:white;
        border-radius:25px;
        padding:40px;
        box-shadow:0 10px 30px rgba(0,0,0,.25);
    }

    h1{
        text-align:center;
        color:#0d6efd;
        font-weight:bold;
        margin-bottom:10px;
    }

    .subtitulo{
        text-align:center;
        color:#666;
        margin-bottom:35px;
    }

    .game-card{
        text-decoration:none;
        color:inherit;
        border:none;
        border-radius:18px;
        transition:.3s;
        display:block;
    }

    .game-card:hover{
        transform:translateY(-6px);
        box-shadow:0 8px 20px rgba(0,0,0,.15);
    }

    .game-title{
        font-size:1.2rem;
        font-weight:bold;
    }

    .game-desc{
        color:#777;
        font-size:.95rem;
    }
</style>
</head>
<body>

<div class="contenedor">
    <div class="card-principal">

        <h1>🎮 Proyecto de Juegos</h1>
        <p class="subtitulo">Selecciona un juego para comenzar</p>

        <div class="row g-4">

            <div class="col-md-6">
                <a href="crucigrama.html" class="card shadow-sm game-card">
                    <div class="card-body">
                        <div class="game-title">✏️ Crucigrama</div>
                        <div class="game-desc">Completa todas las palabras.</div>
                    </div>
                </a>
            </div>

            <div class="col-md-6">
                <a href="cuestionario.html" class="card shadow-sm game-card">
                    <div class="card-body">
                        <div class="game-title">❓ Cuestionario</div>
                        <div class="game-desc">Responde preguntas interactivas.</div>
                    </div>
                </a>
            </div>

            <div class="col-md-6">
                <a href="pares.html" class="card shadow-sm game-card">
                    <div class="card-body">
                        <div class="game-title">🧠 Juego de Memoria</div>
                        <div class="game-desc">Encuentra todas las parejas.</div>
                    </div>
                </a>
            </div>

            <div class="col-md-6">
                <a href="juegoantiguo.html" class="card shadow-sm game-card">
                    <div class="card-body">
                        <div class="game-title">🐍 Juego Antiguo</div>
                        <div class="game-desc">Retro snake clásico.</div>
                    </div>
                </a>
            </div>

            <div class="col-md-12">
                <a href="sopadeletras.html" class="card shadow-sm game-card">
                    <div class="card-body">
                        <div class="game-title">🔍 Sopa de Letras</div>
                        <div class="game-desc">Encuentra palabras ocultas.</div>
                    </div>
                </a>
            </div>

        </div>

    </div>
</div>

</body>
</html>
