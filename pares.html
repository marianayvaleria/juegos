<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Juego de Memoria</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background: linear-gradient(135deg,#0d6efd,#6610f2);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial, sans-serif;
    }

    .game-container{
      width:100%;
      max-width:800px;
    }

    .title{
      text-align:center;
      color:white;
      font-weight:bold;
      margin-bottom:10px;
    }

    .subtitle{
      text-align:center;
      color:white;
      margin-bottom:30px;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:15px;
    }

    .card-memory{
      height:120px;
      position:relative;
      cursor:pointer;
      perspective:1000px;
    }

    .card-inner{
      width:100%;
      height:100%;
      position:absolute;
      transition:transform 0.6s;
      transform-style:preserve-3d;
    }

    .flip .card-inner{
      transform:rotateY(180deg);
    }

    .card-front,
    .card-back{
      position:absolute;
      width:100%;
      height:100%;
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      backface-visibility:hidden;
      font-size:45px;
      font-weight:bold;
      box-shadow:0 5px 10px rgba(0,0,0,0.3);
    }

    /* Parte frontal */
    .card-front{
      background:white;
      color:black;
    }

    /* Parte trasera */
    .card-back{
      background:#212529;
      transform:rotateY(180deg);
      color:#212529;
    }

    .matched .card-front{
      background:#198754;
      color:white;
    }

    .info{
      color:white;
      text-align:center;
      margin-bottom:20px;
      font-size:20px;
    }
  </style>
</head>
<body>

<div class="container game-container">

  <h1 class="title">🧠 Juego de Memoria</h1>

  <p class="subtitle">
    Memoriza las cartas antes de que se oculten
  </p>

  <div class="info">
    Intentos: <span id="attempts">0</span>
  </div>

  <div class="board" id="board"></div>

  <div class="text-center mt-4">
    <button class="btn btn-warning btn-lg" onclick="restartGame()">
      Reiniciar Juego
    </button>
  </div>

</div>

<script>

const emojis = [
  "🍎","🍌","🍇","🍉",
  "🍒","🥝","🍍","🍑"
];

let cards = [...emojis, ...emojis];

let firstCard = null;
let secondCard = null;
let lockBoard = true;

let attempts = 0;
let matches = 0;

const board = document.getElementById("board");


// Mezclar cartas
function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}


// Crear tablero
function createBoard(){

  board.innerHTML = "";

  cards = shuffle(cards);

  cards.forEach((emoji,index)=>{

    const card = document.createElement("div");

    card.classList.add("card-memory");

    // AL INICIO SE MUESTRAN
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-front">${emoji}</div>
        <div class="card-back">?</div>
      </div>
    `;

    card.dataset.emoji = emoji;

    card.addEventListener("click", flipCard);

    board.appendChild(card);

  });

  // Esperar 4 segundos y ocultar
  setTimeout(()=>{

    document.querySelectorAll(".card-memory")
      .forEach(card=>{
        card.classList.add("flip");
      });

    lockBoard = false;

  },4000);

}


// Voltear carta
function flipCard(){

  if(lockBoard) return;

  if(this === firstCard) return;

  if(this.classList.contains("matched")) return;

  this.classList.remove("flip");

  if(!firstCard){

    firstCard = this;
    return;

  }

  secondCard = this;

  attempts++;

  document.getElementById("attempts").innerText = attempts;

  checkMatch();

}


// Verificar pares
function checkMatch(){

  const isMatch =
    firstCard.dataset.emoji === secondCard.dataset.emoji;

  if(isMatch){

    firstCard.classList.add("matched");
    secondCard.classList.add("matched");

    matches++;

    resetTurn();

    // Ganaste
    if(matches === emojis.length){

      setTimeout(()=>{

        alert("🎉 ¡Ganaste el juego!");

      },500);

    }

  }else{

    lockBoard = true;

    setTimeout(()=>{

      firstCard.classList.add("flip");
      secondCard.classList.add("flip");

      resetTurn();

    },1000);

  }

}


// Resetear turno
function resetTurn(){

  firstCard = null;
  secondCard = null;

  lockBoard = false;

}


// Reiniciar juego
function restartGame(){

  attempts = 0;
  matches = 0;

  document.getElementById("attempts").innerText = 0;

  firstCard = null;
  secondCard = null;

  lockBoard = true;

  createBoard();

}


// Iniciar juego
createBoard();

</script>

</body>
</html>
